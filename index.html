<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>備品一覧 — OCEANS</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖥</text></svg>">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    button { font-family: inherit; }
    a { text-decoration: none; }

    @keyframes floatOrb1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-30px, 40px) scale(1.1); }
      66% { transform: translate(20px, -20px) scale(0.95); }
    }
    @keyframes floatOrb2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 30px) scale(0.9); }
    }
    @keyframes floatOrb3 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-40px, 20px); }
    }

    @media (max-width: 600px) {
      .stats-row { flex-direction: column !important; }
      .hero-title { font-size: 34px !important; }
      .filter-bar { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ═══════════ SVG Icons ═══════════ */
    const Icons = {
      Laptop: ({ size = 22, color, style }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={style}>
          <path d="M20 16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v9m16 0H4m16 0 1.28 2.55a1 1 0 0 1-.9 1.45H3.62a1 1 0 0 1-.9-1.45L4 16"/>
        </svg>
      ),
      Monitor: ({ size = 22, color, style }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={style}>
          <rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/>
        </svg>
      ),
      Keyboard: ({ size = 22, color, style }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={style}>
          <rect width="20" height="16" x="2" y="4" rx="2"/><path d="M6 8h.001M10 8h.001M14 8h.001M18 8h.001M8 12h.001M12 12h.001M16 12h.001M7 16h10"/>
        </svg>
      ),
      Mouse: ({ size = 22, color, style }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={style}>
          <rect width="12" height="18" x="6" y="3" rx="6"/><path d="M12 7v4"/>
        </svg>
      ),
      Stand: ({ size = 22, color, style }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={style}>
          <rect width="18" height="12" x="3" y="3" rx="2"/><path d="M12 15v4M8 19h8"/>
        </svg>
      ),
      Grip: ({ size = 22, color, style }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={style}>
          <circle cx="12" cy="5" r="1"/><circle cx="19" cy="5" r="1"/><circle cx="5" cy="5" r="1"/>
          <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
          <circle cx="12" cy="19" r="1"/><circle cx="19" cy="19" r="1"/><circle cx="5" cy="19" r="1"/>
        </svg>
      ),
      ArrowUpRight: ({ size = 12, color, style }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color || "currentColor"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={style}>
          <path d="M7 7h10v10M7 17 17 7"/>
        </svg>
      ),
      Users: ({ size = 11, color, style }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color || "currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      ),
      Layers: ({ size = 11, color, style }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color || "currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
          <path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 12-8.58 4.08a2 2 0 0 1-1.66 0L2 12M22 17l-8.58 4.08a2 2 0 0 1-1.66 0L2 17"/>
        </svg>
      ),
      Package: ({ size = 11, color, style }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color || "currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
          <path d="m7.5 4.27 9 5.15M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5M12 22V12"/>
        </svg>
      ),
    };

    /* ═══════════ Data ═══════════ */
    const equipmentData = [
      { id: 1, name: "MacBook Pro M5", sub: '14" / 32GB / 1TB SSD', brand: "Apple", category: "PC", color: "#6366F1", url: "https://amzn.asia/d/092PHwjt", icon: "Laptop", finish: "スペースブラック", user: "中植" },
      { id: 2, name: "S2722DC モニター", sub: '27" QHD / IPS / USB-C', brand: "Dell", category: "モニター", color: "#10B981", url: "https://amzn.asia/d/huZo4Am", icon: "Monitor", finish: "75Hz / スピーカー付", user: "中植" },
      { id: 3, name: "PCスタンド 回転式", sub: "360° / 折りたたみ / 無段階調整", brand: "EPN", category: "スタンド", color: "#F59E0B", url: "https://amzn.asia/d/01dfglW4", icon: "Stand", finish: "人間工学設計", user: "中植" },
      { id: 4, name: "MX KEYS mini", sub: "Bluetooth / 充電式 / 日本語配列", brand: "Logicool", category: "キーボード", color: "#EC4899", url: "https://amzn.asia/d/gRjAFMU", icon: "Keyboard", finish: "グラファイト", user: "中植" },
      { id: 5, name: "MX ERGO S", sub: "トラックボール / 静音 / BT", brand: "Logicool", category: "マウス", color: "#8B5CF6", url: "https://amzn.asia/d/fzFRgbs", icon: "Mouse", finish: "グラファイト", user: "中植" },
      { id: 6, name: "モニターアーム", sub: '13-32" / ガススプリング / VESA', brand: "—", category: "アーム", color: "#06B6D4", url: "https://amzn.asia/d/0wfmNV4", icon: "Grip", finish: "シングル", user: "中植" },
    ];

    const allCategories = ["すべて", ...Array.from(new Set(equipmentData.map(e => e.category)))];
    const allUsers = Array.from(new Set(equipmentData.map(e => e.user)));

    /* ═══════════ Card ═══════════ */
    function Card({ item, index, isVisible }) {
      const [hovered, setHovered] = useState(false);
      const [mousePos, setMousePos] = useState({ x: 50, y: 50 });
      const cardRef = useRef(null);
      const IconComp = Icons[item.icon];

      const handleMouseMove = (e) => {
        if (!cardRef.current) return;
        const rect = cardRef.current.getBoundingClientRect();
        setMousePos({
          x: ((e.clientX - rect.left) / rect.width) * 100,
          y: ((e.clientY - rect.top) / rect.height) * 100,
        });
      };

      return (
        <div
          ref={cardRef}
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
          onMouseMove={handleMouseMove}
          style={{
            position: "relative", borderRadius: 20, padding: "28px 28px 24px",
            background: hovered ? "rgba(255,255,255,0.95)" : "rgba(255,255,255,0.72)",
            backdropFilter: "blur(40px) saturate(180%)", WebkitBackdropFilter: "blur(40px) saturate(180%)",
            border: "1px solid " + (hovered ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.5)"),
            boxShadow: hovered
              ? "0 20px 60px -10px " + item.color + "18, 0 8px 24px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.8)"
              : "0 2px 12px rgba(0,0,0,0.03), inset 0 1px 0 rgba(255,255,255,0.5)",
            cursor: "default", overflow: "hidden",
            opacity: isVisible ? 1 : 0,
            transform: isVisible ? (hovered ? "translateY(-2px) scale(1.005)" : "translateY(0) scale(1)") : "translateY(30px) scale(0.97)",
            transition: "all 0.7s cubic-bezier(0.16, 1, 0.3, 1) " + (index * 0.08) + "s",
            willChange: "transform, opacity, box-shadow",
          }}
        >
          <div style={{
            position: "absolute", inset: 0, borderRadius: 20,
            opacity: hovered ? 0.07 : 0,
            background: "radial-gradient(600px circle at " + mousePos.x + "% " + mousePos.y + "%, " + item.color + ", transparent 50%)",
            transition: "opacity 0.4s ease", pointerEvents: "none",
          }} />

          <div style={{ position: "relative", zIndex: 1, display: "flex", alignItems: "flex-start", gap: 20 }}>
            <div style={{
              width: 52, height: 52, borderRadius: 14,
              background: "linear-gradient(135deg, " + item.color + "12, " + item.color + "06)",
              border: "1px solid " + item.color + "18",
              display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
              transition: "all 0.5s cubic-bezier(0.16, 1, 0.3, 1)",
              transform: hovered ? "scale(1.08)" : "scale(1)",
            }}>
              <IconComp size={22} color={item.color} style={{ transition: "all 0.4s ease", opacity: hovered ? 1 : 0.7 }} />
            </div>

            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6, flexWrap: "wrap" }}>
                <span style={{ fontSize: 17, fontWeight: 600, color: "#1D1D1F", letterSpacing: "-0.025em", lineHeight: 1.2 }}>{item.name}</span>
                <span style={{
                  fontSize: 10, fontWeight: 600, color: item.color,
                  background: item.color + "0D", padding: "3px 9px", borderRadius: 99,
                  letterSpacing: "0.04em", flexShrink: 0, border: "1px solid " + item.color + "15",
                }}>{item.category}</span>
              </div>
              <p style={{ fontSize: 13, color: "#86868B", margin: "0 0 4px", letterSpacing: "-0.01em", lineHeight: 1.5 }}>
                <span style={{ color: "#6E6E73", fontWeight: 500 }}>{item.brand}</span>
                <span style={{ margin: "0 7px", color: "#D2D2D7" }}>·</span>{item.sub}
              </p>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <p style={{ fontSize: 12, color: "#AEAEB2", margin: 0 }}>{item.finish}</p>
                <span style={{ fontSize: 10.5, color: "#86868B", fontWeight: 500, background: "rgba(0,0,0,0.03)", padding: "2px 8px", borderRadius: 6 }}>{item.user}</span>
              </div>
            </div>

            <a href={item.url} target="_blank" rel="noopener noreferrer"
              style={{
                display: "flex", alignItems: "center", gap: 4, fontSize: 12, fontWeight: 500,
                color: hovered ? "#1D1D1F" : "#AEAEB2", padding: "7px 12px", borderRadius: 10,
                background: hovered ? "rgba(0,0,0,0.04)" : "transparent",
                transition: "all 0.3s ease", flexShrink: 0, marginTop: 2,
              }}
              onMouseEnter={(e) => { e.currentTarget.style.background = item.color + "12"; e.currentTarget.style.color = item.color; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = hovered ? "rgba(0,0,0,0.04)" : "transparent"; e.currentTarget.style.color = hovered ? "#1D1D1F" : "#AEAEB2"; }}
            >
              Amazon<Icons.ArrowUpRight size={12} />
            </a>
          </div>
        </div>
      );
    }

    /* ═══════════ FilterPill ═══════════ */
    function FilterPill({ label, isActive, onClick }) {
      const [hovered, setHovered] = useState(false);
      return (
        <button onClick={onClick} onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
          style={{
            padding: "7px 18px", borderRadius: 99, border: "none",
            background: isActive ? "#1D1D1F" : hovered ? "rgba(0,0,0,0.05)" : "transparent",
            color: isActive ? "#FFFFFF" : hovered ? "#1D1D1F" : "#86868B",
            fontSize: 13, fontWeight: isActive ? 500 : 400, cursor: "pointer",
            transition: "all 0.35s cubic-bezier(0.16, 1, 0.3, 1)", letterSpacing: "-0.01em",
            transform: isActive ? "scale(1)" : hovered ? "scale(1.03)" : "scale(1)",
            whiteSpace: "nowrap",
          }}
        >{label}</button>
      );
    }

    /* ═══════════ AnimatedNumber ═══════════ */
    function AnimatedNumber({ value, delay = 0 }) {
      const [display, setDisplay] = useState(0);
      useEffect(() => {
        const timer = setTimeout(() => {
          const duration = 800; const startTime = Date.now();
          const animate = () => {
            const p = Math.min((Date.now() - startTime) / duration, 1);
            setDisplay(Math.round((1 - Math.pow(1 - p, 3)) * value));
            if (p < 1) requestAnimationFrame(animate);
          };
          animate();
        }, delay);
        return () => clearTimeout(timer);
      }, [value, delay]);
      return React.createElement("span", null, display);
    }

    /* ═══════════ App ═══════════ */
    function App() {
      const [filter, setFilter] = useState("すべて");
      const [userFilter, setUserFilter] = useState("すべて");
      const [loaded, setLoaded] = useState(false);
      const [headerVisible, setHeaderVisible] = useState(false);

      useEffect(() => {
        const t1 = setTimeout(() => setHeaderVisible(true), 100);
        const t2 = setTimeout(() => setLoaded(true), 400);
        return () => { clearTimeout(t1); clearTimeout(t2); };
      }, []);

      let filtered = equipmentData;
      if (filter !== "すべて") filtered = filtered.filter(e => e.category === filter);
      if (userFilter !== "すべて") filtered = filtered.filter(e => e.user === userFilter);

      const categoryCount = new Set(equipmentData.map(e => e.category)).size;
      const userFilterOptions = ["すべて", ...allUsers];

      return (
        <div style={{
          minHeight: "100vh",
          background: "linear-gradient(180deg, #F5F5F7 0%, #ECECEE 50%, #E8E8ED 100%)",
          position: "relative", overflow: "hidden",
        }}>
          <div style={{
            position: "fixed", inset: 0, pointerEvents: "none", zIndex: 0,
            opacity: headerVisible ? 0.5 : 0, transition: "opacity 2s ease",
          }}>
            <div style={{ position: "absolute", width: 500, height: 500, borderRadius: "50%", background: "radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%)", top: "-10%", right: "5%", animation: "floatOrb1 20s ease-in-out infinite" }} />
            <div style={{ position: "absolute", width: 400, height: 400, borderRadius: "50%", background: "radial-gradient(circle, rgba(16,185,129,0.06) 0%, transparent 70%)", bottom: "10%", left: "-5%", animation: "floatOrb2 25s ease-in-out infinite" }} />
            <div style={{ position: "absolute", width: 300, height: 300, borderRadius: "50%", background: "radial-gradient(circle, rgba(236,72,153,0.05) 0%, transparent 70%)", top: "40%", right: "20%", animation: "floatOrb3 18s ease-in-out infinite" }} />
          </div>

          <div style={{ position: "relative", zIndex: 1, maxWidth: 760, margin: "0 auto", padding: "0 24px" }}>
            {/* Hero */}
            <div style={{
              paddingTop: 72, paddingBottom: 24,
              opacity: headerVisible ? 1 : 0,
              transform: headerVisible ? "translateY(0)" : "translateY(20px)",
              transition: "all 1s cubic-bezier(0.16, 1, 0.3, 1)",
            }}>
              <h1 className="hero-title" style={{ fontSize: 44, fontWeight: 700, color: "#1D1D1F", letterSpacing: "-0.04em", lineHeight: 1.1, margin: "0 0 8px" }}>
                備品一覧
              </h1>
              <p style={{ fontSize: 18, color: "#86868B", fontWeight: 400, margin: 0, letterSpacing: "-0.02em" }}>
                OCEANS — 個人配布備品の管理
              </p>
            </div>

            {/* Stats */}
            <div className="stats-row" style={{
              display: "flex", gap: 12, marginBottom: 36,
              opacity: headerVisible ? 1 : 0,
              transform: headerVisible ? "translateY(0)" : "translateY(16px)",
              transition: "all 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.15s",
            }}>
              {[
                { label: "メンバー", value: allUsers.length, icon: Icons.Users },
                { label: "アイテム", value: equipmentData.length, icon: Icons.Package },
                { label: "カテゴリ", value: categoryCount, icon: Icons.Layers },
              ].map((stat, i) => (
                <div key={stat.label} style={{
                  flex: "1 1 140px", minWidth: 140,
                  background: "rgba(255,255,255,0.6)",
                  backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
                  borderRadius: 16, padding: "18px 20px",
                  border: "1px solid rgba(255,255,255,0.6)",
                  boxShadow: "0 1px 4px rgba(0,0,0,0.02)",
                }}>
                  <div style={{
                    fontSize: 11, color: "#AEAEB2", fontWeight: 500,
                    letterSpacing: "0.02em", textTransform: "uppercase",
                    marginBottom: 6, display: "flex", alignItems: "center", gap: 5,
                  }}>
                    {stat.icon && <stat.icon size={11} />}
                    {stat.label}
                  </div>
                  <div style={{ fontSize: 24, fontWeight: 600, color: "#1D1D1F", letterSpacing: "-0.03em" }}>
                    <AnimatedNumber value={stat.value} delay={600 + i * 200} />
                  </div>
                </div>
              ))}
            </div>

            {/* Filters */}
            <div style={{
              display: "flex", flexDirection: "column", gap: 10, marginBottom: 24,
              opacity: headerVisible ? 1 : 0,
              transform: headerVisible ? "translateY(0)" : "translateY(12px)",
              transition: "all 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.25s",
            }}>
              <div className="filter-bar" style={{
                display: "flex", gap: 4, padding: "4px",
                background: "rgba(255,255,255,0.45)",
                backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
                borderRadius: 99, border: "1px solid rgba(255,255,255,0.5)",
                boxShadow: "0 1px 4px rgba(0,0,0,0.02)", width: "fit-content",
              }}>
                {allCategories.map(cat => (
                  <FilterPill key={cat} label={cat} isActive={filter === cat} onClick={() => setFilter(cat)} />
                ))}
              </div>

              {allUsers.length > 1 && (
                <div className="filter-bar" style={{
                  display: "flex", gap: 4, padding: "4px",
                  background: "rgba(255,255,255,0.35)",
                  borderRadius: 99, border: "1px solid rgba(255,255,255,0.4)",
                  width: "fit-content",
                }}>
                  {userFilterOptions.map(u => (
                    <FilterPill key={u} label={u} isActive={userFilter === u} onClick={() => setUserFilter(u)} />
                  ))}
                </div>
              )}
            </div>

            <div style={{
              fontSize: 13, color: "#AEAEB2", marginBottom: 16, paddingLeft: 4,
              opacity: headerVisible ? 1 : 0, transition: "opacity 0.6s ease 0.4s",
            }}>
              {filtered.length} 件{filter !== "すべて" ? " — " + filter : ""}{userFilter !== "すべて" ? " · " + userFilter : ""}
            </div>

            {/* Cards */}
            <div style={{ display: "flex", flexDirection: "column", gap: 12, paddingBottom: 60 }}>
              {filtered.map((item, i) => (
                <Card key={item.id} item={item} index={i} isVisible={loaded} />
              ))}
              {filtered.length === 0 && (
                <div style={{ textAlign: "center", padding: "60px 20px", color: "#AEAEB2", fontSize: 14 }}>
                  該当する備品がありません
                </div>
              )}
            </div>

            {/* Footer */}
            <div style={{
              textAlign: "center", paddingBottom: 48,
              opacity: loaded ? 0.4 : 0, transition: "opacity 1s ease 1s",
            }}>
              <div style={{ width: 32, height: 1, background: "#C7C7CC", margin: "0 auto 14px" }} />
              <p style={{ fontSize: 11, color: "#AEAEB2", letterSpacing: "0.02em" }}>最終更新 2026.04.14</p>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
