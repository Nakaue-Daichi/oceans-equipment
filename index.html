<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>OCEANS — 備品管理</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚓</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Outfit',-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;background:#F0F6FF}
    button{font-family:inherit;cursor:pointer}
    a{text-decoration:none}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.15);border-radius:3px}

    @keyframes rippleOut{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
    @keyframes fadeSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes gentleSway{0%,100%{transform:rotate(-1deg)}50%{transform:rotate(1deg)}}
    @keyframes spin{to{transform:rotate(360deg)}}

    .ripple-container{position:absolute;inset:0;overflow:hidden;border-radius:inherit;pointer-events:none}
    .ripple{position:absolute;border-radius:50%;background:rgba(59,130,246,0.12);animation:rippleOut 0.6s ease-out forwards;width:80px;height:80px;margin:-40px}
    .drag-handle{cursor:grab;opacity:0.25;transition:opacity 0.2s,transform 0.2s}
    .drag-handle:hover{opacity:0.5;transform:scale(1.15)}
    .drag-handle:active{cursor:grabbing}

    @media(max-width:768px){
      .app-layout{flex-direction:column!important}
      .sidebar{width:100%!important;height:auto!important;border-right:none!important;border-bottom:1px solid #E8F0FE!important;padding:16px!important}
      .sb-members{flex-direction:row!important;overflow-x:auto!important}
      .main-content{height:auto!important;min-height:60vh}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useMemo,useCallback}=React;

const SHEET_ID="1QlTsEjnTNp1ucQKxt3i2GwGrdWaPGoddEfJqCl4iqKg";
const CSV_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
const SHEET_EDIT_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`;
const API_URL="https://script.google.com/macros/s/AKfycbyq08TtvcdnepkSE9uhQeA8_PdbYIr4syy74gCUUZjR0mUGGlqEFoem3qgg2qPhaiXdYQ/exec";

/* ═══ Icons ═══ */
const I={
  Laptop:(p)=><svg width={p.s||22} height={p.s||22} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v9m16 0H4m16 0 1.28 2.55a1 1 0 0 1-.9 1.45H3.62a1 1 0 0 1-.9-1.45L4 16"/></svg>,
  Monitor:(p)=><svg width={p.s||22} height={p.s||22} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>,
  Keyboard:(p)=><svg width={p.s||22} height={p.s||22} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="M6 8h.001M10 8h.001M14 8h.001M18 8h.001M8 12h.001M12 12h.001M16 12h.001M7 16h10"/></svg>,
  Mouse:(p)=><svg width={p.s||22} height={p.s||22} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect width="12" height="18" x="6" y="3" rx="6"/><path d="M12 7v4"/></svg>,
  Stand:(p)=><svg width={p.s||22} height={p.s||22} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="12" x="3" y="3" rx="2"/><path d="M12 15v4M8 19h8"/></svg>,
  Grip:(p)=><svg width={p.s||22} height={p.s||22} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="19" cy="5" r="1"/><circle cx="5" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/><circle cx="12" cy="19" r="1"/><circle cx="19" cy="19" r="1"/><circle cx="5" cy="19" r="1"/></svg>,
  Box:(p)=><svg width={p.s||22} height={p.s||22} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="m7.5 4.27 9 5.15M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5M12 22V12"/></svg>,
  Arrow:(p)=><svg width={p.s||11} height={p.s||11} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M7 7h10v10M7 17 17 7"/></svg>,
  Anchor:(p)=><svg width={p.s||18} height={p.s||18} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="5" r="3"/><line x1="12" x2="12" y1="8" y2="21"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></svg>,
  User:(p)=><svg width={p.s||10} height={p.s||10} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  Users:(p)=><svg width={p.s||13} height={p.s||13} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  DragDots:(p)=><svg width={p.s||16} height={p.s||16} viewBox="0 0 24 24" fill={p.c||"#CBD5E1"} stroke="none"><circle cx="9" cy="5" r="1.5"/><circle cx="15" cy="5" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="19" r="1.5"/><circle cx="15" cy="19" r="1.5"/></svg>,
  Sheet:(p)=><svg width={p.s||14} height={p.s||14} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M8 13h2M8 17h2M14 13h2M14 17h2"/></svg>,
  Refresh:(p)=><svg width={p.s||14} height={p.s||14} viewBox="0 0 24 24" fill="none" stroke={p.c||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>,
};

/* Category config */
const catConfig={
  "PC":{icon:I.Laptop,color:"#3B82F6"},
  "モニター":{icon:I.Monitor,color:"#10B981"},
  "スタンド":{icon:I.Stand,color:"#F59E0B"},
  "キーボード":{icon:I.Keyboard,color:"#EC4899"},
  "マウス":{icon:I.Mouse,color:"#8B5CF6"},
  "アーム":{icon:I.Grip,color:"#06B6D4"},
};
const defaultCat={icon:I.Box,color:"#64748B"};
function getCat(cat){return catConfig[cat]||defaultCat}

const ucMap={"中植":"#3B82F6","畑山":"#10B981","田中":"#8B5CF6","山本":"#F59E0B","佐藤":"#EC4899","鈴木":"#06B6D4"};
const ucColors=["#3B82F6","#10B981","#F59E0B","#EC4899","#8B5CF6","#06B6D4","#EF4444","#14B8A6"];
function uc(name){return ucMap[name]||ucColors[Math.abs([...name].reduce((a,c)=>a+c.charCodeAt(0),0))%ucColors.length]}

/* ═══ CSV Parser ═══ */
function parseCSV(text){
  const lines=[];let cur="";let inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){if(inQ&&text[i+1]==='"'){cur+='"';i++}else{inQ=!inQ}}
    else if(c===','&&!inQ){lines.length===0?lines.push([cur]):lines[lines.length-1].push(cur);cur=""}
    else if((c==='\n'||c==='\r')&&!inQ){if(cur||lines[lines.length-1]){if(lines.length===0)lines.push([cur]);else lines[lines.length-1].push(cur)}cur="";if(c==='\r'&&text[i+1]==='\n')i++;lines.push([])}
    else{cur+=c}
  }
  if(cur&&lines.length>0)lines[lines.length-1].push(cur);
  const rows=lines.filter(r=>r.length>1);
  if(rows.length<2)return[];
  const headers=rows[0].map(h=>h.trim());
  return rows.slice(1).map((row,idx)=>{
    const obj={};headers.forEach((h,i)=>{obj[h]=row[i]?row[i].trim():""});
    const cat=getCat(obj.category);
    return{id:parseInt(obj.id)||idx+1,name:obj.name||"",brand:obj.brand||"",category:obj.category||"",specs:obj.specs||"",finish:obj.finish||"",user:obj.user||null,url:obj.url||"",color:cat.color,icon:cat.icon};
  });
}

/* ═══ Ripple ═══ */
function useRipple(){
  const[rips,setRips]=useState([]);
  const add=useCallback((e,el)=>{const r=el.getBoundingClientRect();const rip={x:e.clientX-r.left,y:e.clientY-r.top,id:Date.now()};setRips(p=>[...p,rip]);setTimeout(()=>setRips(p=>p.filter(r2=>r2.id!==rip.id)),600)},[]);
  const R=()=>React.createElement("div",{className:"ripple-container"},rips.map(r=>React.createElement("div",{key:r.id,className:"ripple",style:{left:r.x,top:r.y}})));
  return{add,R};
}

/* ═══ Wave ═══ */
function WaveDecoration(){
  return(
    <div style={{position:"absolute",bottom:0,left:0,right:0,height:190,overflow:"hidden",pointerEvents:"none"}}>
      <svg viewBox="0 0 480 190" preserveAspectRatio="none" style={{width:"100%",height:"100%",position:"absolute",bottom:0}}>
        <path fill="#DBEAFE" opacity="0.25">
          <animate attributeName="d" dur="10s" repeatCount="indefinite" values="M0 48Q60 40 120 46T240 42T360 48T480 40V190H0Z;M0 42Q60 48 120 40T240 46T360 42T480 48V190H0Z;M0 48Q60 40 120 46T240 42T360 48T480 40V190H0Z"/>
        </path>
        <path fill="#BFDBFE" opacity="0.35">
          <animate attributeName="d" dur="7s" repeatCount="indefinite" values="M0 68Q60 60 120 66T240 62T360 68T480 60V190H0Z;M0 62Q60 68 120 60T240 66T360 62T480 68V190H0Z;M0 68Q60 60 120 66T240 62T360 68T480 60V190H0Z"/>
        </path>
        <path fill="#93C5FD" opacity="0.2">
          <animate attributeName="d" dur="5s" repeatCount="indefinite" values="M0 90Q60 84 120 88T240 85T360 90T480 84V190H0Z;M0 85Q60 90 120 84T240 88T360 85T480 90V190H0Z;M0 90Q60 84 120 88T240 85T360 90T480 84V190H0Z"/>
        </path>
        <rect y="120" width="480" height="70" fill="#BFDBFE" opacity="0.15"/>
      </svg>
    </div>
  );
}

/* ═══ Card ═══ */
function Card({item,index,isVisible,isDragging,onDragStart,onDragEnter,onDragEnd,onChangeUser,allUsers:au}){
  const[h,setH]=useState(false);
  const[mp,setMp]=useState({x:50,y:50});
  const[pressed,setPressed]=useState(false);
  const[showPicker,setShowPicker]=useState(false);
  const ref=useRef(null);
  const pickerRef=useRef(null);
  const{add,R}=useRipple();
  const Ico=item.icon;
  const un=!item.user;
  const userColor=item.user?uc(item.user):"#CBD5E1";

  useEffect(()=>{
    if(!showPicker)return;
    const close=(e)=>{if(pickerRef.current&&!pickerRef.current.contains(e.target))setShowPicker(false)};
    document.addEventListener("mousedown",close);
    return()=>document.removeEventListener("mousedown",close);
  },[showPicker]);

  return(
    <div ref={ref}
      onDragEnter={onDragEnter}
      onMouseEnter={()=>setH(true)} onMouseLeave={()=>{setH(false);setPressed(false)}}
      onMouseDown={e=>{if(!e.target.closest('.drag-handle')){setPressed(true);add(e,ref.current)}}}
      onMouseUp={()=>setPressed(false)}
      onMouseMove={e=>{if(!ref.current)return;const r=ref.current.getBoundingClientRect();setMp({x:((e.clientX-r.left)/r.width)*100,y:((e.clientY-r.top)/r.height)*100})}}
      style={{
        position:"relative",borderRadius:18,padding:"22px 8px 22px 4px",
        background:isDragging?"rgba(219,234,254,0.9)":(un?(h?"rgba(255,255,255,0.65)":"rgba(255,255,255,0.4)"):(h?"#FFFFFF":"rgba(255,255,255,0.85)")),
        border:isDragging?"2px solid #93C5FD":(un?("1.5px dashed "+(h?"#CBD5E1":"#E2E8F0")):("1px solid "+(h?"rgba(59,130,246,0.15)":"rgba(0,0,0,0.04)"))),
        boxShadow:isDragging?"0 20px 50px -10px rgba(59,130,246,0.25), 0 8px 20px rgba(0,0,0,0.08)":(h&&!un?"0 12px 40px -8px rgba(59,130,246,0.1), 0 4px 12px rgba(0,0,0,0.03)":"0 1px 3px rgba(0,0,0,0.02)"),
        opacity:isVisible?(isDragging?0.9:(un?0.65:1)):0,
        transform:isVisible?(isDragging?"scale(1.02) rotate(0.5deg)":(pressed?"scale(0.985)":(h?"translateY(-3px)":"translateY(0)"))):"translateY(24px) scale(0.98)",
        transition:isDragging?"box-shadow 0.2s":(pressed?"transform 0.1s":"all 0.55s cubic-bezier(0.34,1.56,0.64,1) "+(index*0.06)+"s"),
        cursor:"default",zIndex:isDragging?100:1,
      }}
    >
      <div style={{position:"absolute",inset:0,borderRadius:18,overflow:"hidden",pointerEvents:"none"}}><R/></div>
      {!un&&!isDragging&&<div style={{position:"absolute",inset:0,borderRadius:18,opacity:h?0.06:0,background:"radial-gradient(450px circle at "+mp.x+"% "+mp.y+"%, "+item.color+", transparent 60%)",transition:"opacity 0.4s",pointerEvents:"none"}}/>}

      <div style={{position:"relative",zIndex:1,display:"flex",alignItems:"flex-start",gap:8}}>
        <div className="drag-handle" draggable onDragStart={onDragStart} onDragEnd={onDragEnd}
          style={{display:"flex",alignItems:"center",justifyContent:"center",width:24,minHeight:46,flexShrink:0,alignSelf:"center",touchAction:"none"}}>
          <I.DragDots s={14} c={isDragging?"#3B82F6":"#CBD5E1"}/>
        </div>

        <div style={{
          width:46,height:46,borderRadius:13,flexShrink:0,
          background:un?"#F8FAFC":"linear-gradient(135deg,"+item.color+"10,"+item.color+"05)",
          border:un?"1px dashed #E2E8F0":"1px solid "+item.color+"18",
          display:"flex",alignItems:"center",justifyContent:"center",
          transition:"all 0.4s cubic-bezier(0.34,1.56,0.64,1)",
          transform:h&&!isDragging?"scale(1.1) rotate(-3deg)":"scale(1) rotate(0)",
        }}>
          <Ico s={20} c={un?"#CBD5E1":item.color} style={{opacity:un?0.4:(h?1:0.65),transition:"all 0.3s"}}/>
        </div>

        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
            <span style={{fontSize:15.5,fontWeight:600,color:un?"#94A3B8":"#1E293B",letterSpacing:"-0.02em"}}>{item.name}</span>
            <span style={{fontSize:9.5,fontWeight:600,letterSpacing:"0.04em",color:un?"#94A3B8":item.color,background:un?"#F1F5F9":(item.color+"0C"),padding:"2px 8px",borderRadius:99,border:"1px solid "+(un?"#E2E8F0":(item.color+"18"))}}>{item.category}</span>
          </div>
          <p style={{fontSize:12.5,color:un?"#CBD5E1":"#64748B",margin:"0 0 3px",lineHeight:1.5}}>
            <span style={{fontWeight:500,color:un?"#94A3B8":"#475569"}}>{item.brand}</span>
            <span style={{margin:"0 6px",color:"#E2E8F0"}}>·</span>{item.specs}
          </p>
          <div style={{display:"flex",alignItems:"center",gap:7,position:"relative"}}>
            <span style={{fontSize:11,color:un?"#CBD5E1":"#94A3B8"}}>{item.finish}</span>
            <div ref={pickerRef} style={{position:"relative"}}>
              {item.user?(
                <button onClick={(e)=>{e.stopPropagation();setShowPicker(!showPicker)}} style={{
                  display:"inline-flex",alignItems:"center",gap:3,fontSize:10,fontWeight:600,color:userColor,
                  background:userColor+"0A",padding:"2px 8px 2px 5px",borderRadius:99,
                  border:"1px solid "+userColor+"15",cursor:"pointer",transition:"all 0.2s",
                }}
                  onMouseEnter={e=>{e.currentTarget.style.background=userColor+"15"}}
                  onMouseLeave={e=>{e.currentTarget.style.background=userColor+"0A"}}
                ><I.User s={8} c={userColor}/>{item.user}<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke={userColor} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" style={{marginLeft:2}}><path d="m6 9 6 6 6-6"/></svg></button>
              ):(
                <button onClick={(e)=>{e.stopPropagation();setShowPicker(!showPicker)}} style={{
                  fontSize:10,fontWeight:500,color:"#94A3B8",background:"#F8FAFC",
                  padding:"2px 8px",borderRadius:99,border:"1px dashed #E2E8F0",
                  cursor:"pointer",transition:"all 0.2s",display:"inline-flex",alignItems:"center",gap:3,
                }}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor="#93C5FD";e.currentTarget.style.color="#3B82F6"}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="#E2E8F0";e.currentTarget.style.color="#94A3B8"}}
                >未使用<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" style={{marginLeft:1}}><path d="m6 9 6 6 6-6"/></svg></button>
              )}
              {showPicker&&(
                <div style={{
                  position:"absolute",bottom:"calc(100% + 6px)",left:0,
                  background:"#FFFFFF",borderRadius:12,padding:"6px",
                  boxShadow:"0 8px 30px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06)",
                  border:"1px solid rgba(59,130,246,0.1)",
                  minWidth:160,zIndex:200,animation:"fadeSlideUp 0.15s ease",
                }}>
                  <p style={{fontSize:9,fontWeight:600,color:"#94A3B8",letterSpacing:"0.06em",padding:"4px 8px 6px",textTransform:"uppercase"}}>使用者を変更</p>
                  {au&&au.map(name=>{
                    const c=uc(name);const isA=item.user===name;
                    return(
                      <button key={name} onClick={()=>{onChangeUser(item.id,name);setShowPicker(false)}}
                        style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"7px 10px",borderRadius:8,border:"none",background:isA?"rgba(59,130,246,0.06)":"transparent",cursor:"pointer",transition:"all 0.15s",textAlign:"left"}}
                        onMouseEnter={e=>{if(!isA)e.currentTarget.style.background="rgba(0,0,0,0.025)"}}
                        onMouseLeave={e=>{if(!isA)e.currentTarget.style.background=isA?"rgba(59,130,246,0.06)":"transparent"}}
                      >
                        <div style={{width:22,height:22,borderRadius:6,background:c+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:600,color:c}}>{name.charAt(0)}</div>
                        <span style={{fontSize:12,fontWeight:isA?600:400,color:isA?"#1E293B":"#64748B"}}>{name}</span>
                        {isA&&<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" style={{marginLeft:"auto"}}><path d="M20 6 9 17l-5-5"/></svg>}
                      </button>
                    );
                  })}
                  <div style={{height:1,background:"#F1F5F9",margin:"4px 0"}}/>
                  <button onClick={()=>{onChangeUser(item.id,null);setShowPicker(false)}}
                    style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"7px 10px",borderRadius:8,border:"none",background:un?"rgba(245,158,11,0.06)":"transparent",cursor:"pointer",transition:"all 0.15s",textAlign:"left"}}
                    onMouseEnter={e=>{if(!un)e.currentTarget.style.background="rgba(0,0,0,0.025)"}}
                    onMouseLeave={e=>{if(!un)e.currentTarget.style.background=un?"rgba(245,158,11,0.06)":"transparent"}}
                  >
                    <div style={{width:22,height:22,borderRadius:6,background:"#FEF3C7",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#D97706"}}>—</div>
                    <span style={{fontSize:12,fontWeight:un?600:400,color:un?"#D97706":"#64748B"}}>未使用にする</span>
                    {un&&<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#D97706" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" style={{marginLeft:"auto"}}><path d="M20 6 9 17l-5-5"/></svg>}
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>

        {item.url&&<a href={item.url} target="_blank" rel="noopener noreferrer"
          onClick={e=>isDragging&&e.preventDefault()}
          style={{display:"flex",alignItems:"center",gap:3,fontSize:11,fontWeight:500,color:h?"#3B82F6":"#C0C8D4",padding:"6px 10px",borderRadius:9,background:h?"rgba(59,130,246,0.06)":"transparent",transition:"all 0.3s",flexShrink:0,marginTop:2}}
          onMouseEnter={e=>{e.currentTarget.style.background="rgba(59,130,246,0.1)";e.currentTarget.style.color="#2563EB";e.currentTarget.style.transform="translateX(2px)"}}
          onMouseLeave={e=>{e.currentTarget.style.background=h?"rgba(59,130,246,0.06)":"transparent";e.currentTarget.style.color=h?"#3B82F6":"#C0C8D4";e.currentTarget.style.transform="translateX(0)"}}
        >Amazon<I.Arrow/></a>}
      </div>
    </div>
  );
}

/* ═══ Pill ═══ */
function Pill({label,active,onClick,count}){
  const[h,setH]=useState(false);
  const[cl,setCl]=useState(false);
  return(
    <button onClick={()=>{setCl(true);setTimeout(()=>setCl(false),200);onClick()}}
      onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{padding:"6px 14px",borderRadius:99,border:active?"1px solid rgba(59,130,246,0.25)":"1px solid transparent",background:active?"#3B82F6":h?"rgba(59,130,246,0.06)":"transparent",color:active?"#FFF":h?"#3B82F6":"#64748B",fontSize:12,fontWeight:active?600:400,transition:cl?"transform 0.1s":"all 0.3s cubic-bezier(0.34,1.56,0.64,1)",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:4,transform:cl?"scale(0.92)":"scale(1)"}}
    >
      {label}
      {count!==undefined&&count>0&&<span style={{fontSize:9,fontWeight:600,background:active?"rgba(255,255,255,0.25)":"rgba(59,130,246,0.08)",color:active?"#FFF":"#64748B",padding:"1px 5px",borderRadius:99,minWidth:16,textAlign:"center"}}>{count}</span>}
    </button>
  );
}

/* ═══ SbMember ═══ */
function SbMember({name,count,active,onClick,isDragging,onDragStart,onDragEnter,draggable:canDrag}){
  const[h,setH]=useState(false);
  const[cl,setCl]=useState(false);
  const isAll=name==="全員";
  const c=isAll?"#3B82F6":uc(name);
  return(
    <div onDragEnter={onDragEnter}
      style={{display:"flex",alignItems:"center",width:"100%",borderRadius:12,opacity:isDragging?0.5:1,background:isDragging?"rgba(59,130,246,0.06)":(active?"rgba(59,130,246,0.06)":h?"rgba(0,0,0,0.02)":"transparent"),transition:cl?"transform 0.1s":"all 0.25s ease",transform:cl?"scale(0.96)":"scale(1)"}}>
      {!isAll&&canDrag?(
        <div draggable onDragStart={onDragStart} className="drag-handle" style={{display:"flex",alignItems:"center",justifyContent:"center",width:20,flexShrink:0,padding:"8px 0 8px 6px",alignSelf:"stretch",cursor:"grab"}}>
          <I.DragDots s={10} c={isDragging?"#3B82F6":"#D4D4D8"}/>
        </div>
      ):(<div style={{width:8,flexShrink:0}}/>)}
      <button onClick={()=>{setCl(true);setTimeout(()=>setCl(false),200);onClick()}}
        onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
        style={{display:"flex",alignItems:"center",gap:10,flex:1,padding:"9px 12px 9px 4px",border:"none",background:"transparent",textAlign:"left",cursor:"pointer"}}>
        <div style={{width:32,height:32,borderRadius:9,flexShrink:0,background:active?(c+"18"):(h?(c+"0C"):(c+"08")),display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:600,color:active?c:(h?c+"CC":c+"88"),transition:"all 0.3s cubic-bezier(0.34,1.56,0.64,1)",transform:h?"scale(1.08)":"scale(1)"}}>
          {isAll?<I.Users s={14} c={active?"#3B82F6":"#94A3B8"}/>:name.charAt(0)}
        </div>
        <span style={{flex:1,fontSize:13,fontWeight:active?600:400,color:active?"#1E293B":h?"#475569":"#94A3B8",transition:"all 0.25s"}}>{name}</span>
        <span style={{fontSize:11,fontWeight:500,color:active?"#3B82F6":"#CBD5E1"}}>{count}</span>
      </button>
    </div>
  );
}

/* ═══ App ═══ */
function App(){
  const[items,setItems]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(null);
  const[dataOrder,setDataOrder]=useState([]);
  const[memberOrder,setMemberOrder]=useState([]);
  const[selUser,setSelUser]=useState(null);
  const[catF,setCatF]=useState("すべて");
  const[statF,setStatF]=useState("すべて");
  const[loaded,setLoaded]=useState(false);
  const[dragId,setDragId]=useState(null);
  const[dragOverItem,setDragOverItem]=useState(null);
  const[dragMember,setDragMember]=useState(null);
  const[dragOverMem,setDragOverMem]=useState(null);
  const[refreshing,setRefreshing]=useState(false);

  const fetchData=useCallback(()=>{
    setRefreshing(true);
    const primary=CSV_URL;
    const fallback=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
    const tryFetch=(url)=>fetch(url,{redirect:'follow'}).then(r=>{if(!r.ok)throw new Error(r.status);return r.text()});
    tryFetch(primary).catch(()=>tryFetch(fallback))
      .then(text=>{
        const parsed=parseCSV(text);
        if(parsed.length===0)throw new Error("empty");
        setItems(parsed);
        setDataOrder(parsed.map(d=>d.id));
        const u=Array.from(new Set(parsed.filter(e=>e.user).map(e=>e.user)));
        setMemberOrder(prev=>prev.length?prev.filter(m=>u.includes(m)).concat(u.filter(m=>!prev.includes(m))):u);
        setLoading(false);setError(null);setRefreshing(false);
        setTimeout(()=>setLoaded(true),200);
      })
      .catch(e=>{setError("データの取得に失敗しました。スプレッドシートの共有設定を確認してください。");setLoading(false);setRefreshing(false)});
  },[]);

  useEffect(()=>{fetchData()},[fetchData]);

  const handleChangeUser=(id,newUser)=>{
    setItems(prev=>prev.map(d=>d.id===id?{...d,user:newUser}:d));
    fetch(API_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify({id:id,user:newUser||""})}).catch(()=>{});
  };

  const allUsers=useMemo(()=>Array.from(new Set(items.filter(e=>e.user).map(e=>e.user))),[items]);
  useEffect(()=>{
    setMemberOrder(prev=>{
      const valid=prev.filter(u=>allUsers.includes(u));
      const newU=allUsers.filter(u=>!prev.includes(u));
      return newU.length||valid.length!==prev.length?[...valid,...newU]:prev;
    });
  },[allUsers]);
  const unusedCnt=useMemo(()=>items.filter(e=>!e.user).length,[items]);
  const mCounts=useMemo(()=>{const m={};allUsers.forEach(u=>{m[u]=items.filter(e=>e.user===u).length});return m},[items,allUsers]);
  const orderedData=useMemo(()=>dataOrder.map(id=>items.find(d=>d.id===id)).filter(Boolean),[dataOrder,items]);
  const cats=useMemo(()=>["すべて",...Array.from(new Set(items.map(e=>e.category).filter(Boolean)))],[items]);

  let filtered=orderedData;
  if(selUser)filtered=filtered.filter(e=>e.user===selUser);
  if(catF!=="すべて")filtered=filtered.filter(e=>e.category===catF);
  if(statF==="使用中")filtered=filtered.filter(e=>e.user);
  if(statF==="未使用")filtered=filtered.filter(e=>!e.user);

  const catCounts=useMemo(()=>{
    const base=selUser?items.filter(e=>e.user===selUser):items;
    const c={};cats.forEach(cat=>{c[cat]=cat==="すべて"?base.length:base.filter(e=>e.category===cat).length});return c;
  },[selUser,items,cats]);

  const handleDragStart=(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain",String(id))};
  const handleDragEnter=(id)=>{if(id!==dragId)setDragOverItem(id)};
  const handleDragOver=(e)=>{e.preventDefault();e.dataTransfer.dropEffect="move"};
  const handleDrop=(e)=>{
    e.preventDefault();
    if(dragId!==null&&dragOverItem!==null&&dragId!==dragOverItem){
      setDataOrder(prev=>{const arr=[...prev];const fi=arr.indexOf(dragId);const ti=arr.indexOf(dragOverItem);arr.splice(fi,1);const nt=fi<ti?ti-1:ti;arr.splice(nt,0,dragId);return arr});
    }
    setDragId(null);setDragOverItem(null);
  };
  const handleDragEnd=()=>{setDragId(null);setDragOverItem(null);setDragMember(null);setDragOverMem(null)};
  const handleMemberDragStart=(e,name)=>{setDragMember(name);e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain","m:"+name)};
  const handleMemberDragEnter=(name)=>{if(name!==dragMember)setDragOverMem(name)};
  const handleMemberDrop=(e)=>{
    e.preventDefault();
    if(dragMember&&dragOverMem&&dragMember!==dragOverMem){
      setMemberOrder(prev=>{const arr=[...prev];const fi=arr.indexOf(dragMember);const ti=arr.indexOf(dragOverMem);arr.splice(fi,1);const nt=fi<ti?ti-1:ti;arr.splice(nt,0,dragMember);return arr});
    }
    setDragMember(null);setDragOverMem(null);
  };

  const catOrder=cats.slice(1);
  const resetCardOrder=()=>{const sorted=[...items].sort((a,b)=>catOrder.indexOf(a.category)-catOrder.indexOf(b.category));setDataOrder(sorted.map(d=>d.id))};

  const DropLine=()=>(<div style={{height:3,borderRadius:2,background:"linear-gradient(90deg,transparent,#3B82F6,#3B82F6,transparent)",margin:"2px 0",animation:"fadeSlideUp 0.15s ease",boxShadow:"0 0 8px rgba(59,130,246,0.3)"}}/>);

  if(loading)return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"linear-gradient(180deg,#F0F6FF,#E8F1FE)",gap:16}}>
      <div style={{width:40,height:40,border:"3px solid #DBEAFE",borderTopColor:"#3B82F6",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <p style={{color:"#94A3B8",fontSize:14}}>データを読み込み中...</p>
    </div>
  );

  if(error)return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"linear-gradient(180deg,#F0F6FF,#E8F1FE)",gap:12}}>
      <p style={{color:"#EF4444",fontSize:14}}>{error}</p>
      <button onClick={fetchData} style={{padding:"8px 20px",borderRadius:10,border:"1px solid #3B82F6",background:"rgba(59,130,246,0.06)",color:"#3B82F6",fontSize:13,fontWeight:500}}>再試行</button>
    </div>
  );

  return(
    <div className="app-layout" style={{display:"flex",height:"100vh",overflow:"hidden",background:"linear-gradient(180deg,#F0F6FF 0%,#E8F1FE 40%,#F0F4FA 100%)"}}>

      <aside className="sidebar" style={{width:250,height:"100vh",position:"relative",background:"rgba(255,255,255,0.7)",backdropFilter:"blur(30px)",WebkitBackdropFilter:"blur(30px)",borderRight:"1px solid rgba(59,130,246,0.08)",display:"flex",flexDirection:"column",padding:"24px 14px 0",flexShrink:0,opacity:loaded?1:0,transform:loaded?"translateX(0)":"translateX(-20px)",transition:"all 0.7s cubic-bezier(0.34,1.56,0.64,1)",overflow:"hidden"}}>
        <div style={{padding:"0 10px 20px",borderBottom:"1px solid rgba(59,130,246,0.06)",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
            <div style={{animation:"gentleSway 4s ease-in-out infinite"}}><I.Anchor s={20} c="#3B82F6"/></div>
            <h1 style={{fontSize:22,fontWeight:800,color:"#1E293B",letterSpacing:"-0.03em"}}>OCEANS</h1>
          </div>
          <p style={{fontSize:11,color:"#475569",fontWeight:400,letterSpacing:"0.03em",paddingLeft:2}}>備品管理</p>
        </div>

        <div style={{flex:1,overflow:"auto",paddingBottom:12}}>
          <div style={{padding:"0 12px",marginBottom:8}}>
            <p style={{fontSize:10,fontWeight:600,color:"#64748B",letterSpacing:"0.08em",textTransform:"uppercase"}}>メンバー</p>
          </div>
          <div className="sb-members" style={{display:"flex",flexDirection:"column",gap:2}}
            onDragOver={e=>{e.preventDefault();e.dataTransfer.dropEffect="move"}} onDrop={handleMemberDrop}>
            <SbMember name="全員" count={items.length} active={!selUser} onClick={()=>setSelUser(null)}/>
            {memberOrder.map(name=>(
              <React.Fragment key={name}>
                {dragMember&&dragOverMem===name&&dragMember!==name&&<DropLine/>}
                <SbMember name={name} count={mCounts[name]||0} active={selUser===name} onClick={()=>setSelUser(name)}
                  draggable isDragging={dragMember===name}
                  onDragStart={e=>handleMemberDragStart(e,name)}
                  onDragEnter={()=>handleMemberDragEnter(name)}
                />
              </React.Fragment>
            ))}
          </div>
          {unusedCnt>0&&(
            <div style={{margin:"16px 4px 0"}}>
              <button onClick={()=>{setSelUser(null);setStatF(statF==="未使用"?"すべて":"未使用")}}
                style={{width:"100%",padding:"10px 14px",borderRadius:12,border:statF==="未使用"?"1px solid rgba(245,158,11,0.15)":"1px solid rgba(0,0,0,0.03)",background:statF==="未使用"?"rgba(245,158,11,0.08)":"rgba(0,0,0,0.015)",cursor:"pointer",transition:"all 0.25s",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,fontWeight:500,color:statF==="未使用"?"#D97706":"#94A3B8"}}>未使用の備品</span>
                <span style={{fontSize:12,fontWeight:700,color:statF==="未使用"?"#D97706":"#CBD5E1"}}>{unusedCnt}</span>
              </button>
            </div>
          )}

          {/* Edit in Sheets */}
          <div style={{margin:"16px 4px 0"}}>
            <a href={SHEET_EDIT_URL} target="_blank" rel="noopener noreferrer"
              style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"10px 14px",borderRadius:12,border:"1px solid rgba(59,130,246,0.1)",background:"rgba(59,130,246,0.03)",transition:"all 0.25s",cursor:"pointer"}}
              onMouseEnter={e=>{e.currentTarget.style.background="rgba(59,130,246,0.08)"}}
              onMouseLeave={e=>{e.currentTarget.style.background="rgba(59,130,246,0.03)"}}
            >
              <I.Sheet s={14} c="#3B82F6"/>
              <span style={{fontSize:12,fontWeight:500,color:"#3B82F6"}}>スプレッドシートで編集</span>
            </a>
          </div>
        </div>

        <div style={{position:"relative",zIndex:2,padding:"12px 12px 16px",borderTop:"1px solid rgba(59,130,246,0.06)",display:"flex",flexDirection:"column",gap:5,marginBottom:8}}>
          {[["合計",items.length],["メンバー",allUsers.length],["更新","自動"]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:10.5,color:"#334155"}}>{k}</span>
              <span style={{fontSize:10.5,fontWeight:600,color:"#1E293B"}}>{v}</span>
            </div>
          ))}
        </div>
        <WaveDecoration/>
      </aside>

      <main className="main-content" style={{flex:1,height:"100vh",overflowY:"auto",overflowX:"hidden",position:"relative"}} onDragOver={handleDragOver} onDrop={handleDrop}>
        <div style={{maxWidth:720,margin:"0 auto",padding:"0 32px"}}>
          <div style={{paddingTop:48,paddingBottom:4,opacity:loaded?1:0,transform:loaded?"translateY(0)":"translateY(16px)",transition:"all 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.1s"}}>
            <h2 style={{fontSize:34,fontWeight:700,color:"#1E293B",letterSpacing:"-0.03em",margin:"0 0 4px",lineHeight:1.15}}>
              {selUser?selUser+" の備品":"すべての備品"}
            </h2>
            <p style={{fontSize:13,color:"#94A3B8",fontWeight:400}}>
              {selUser?((mCounts[selUser]||0)+" アイテム"):(items.length+" アイテム · "+allUsers.length+" メンバー")}
            </p>
          </div>

          <div style={{display:"flex",flexWrap:"wrap",gap:8,margin:"20px 0 16px",opacity:loaded?1:0,transform:loaded?"translateY(0)":"translateY(10px)",transition:"all 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.2s"}}>
            <div className="filter-bar" style={{display:"flex",gap:2,padding:"3px",background:"rgba(255,255,255,0.7)",backdropFilter:"blur(20px)",borderRadius:99,border:"1px solid rgba(59,130,246,0.08)",flexWrap:"wrap"}}>
              {cats.map(cat=>(<Pill key={cat} label={cat} active={catF===cat} count={cat==="すべて"?undefined:catCounts[cat]} onClick={()=>setCatF(cat)}/>))}
            </div>
            <div style={{display:"flex",gap:2,padding:"3px",background:"rgba(255,255,255,0.5)",borderRadius:99,border:"1px solid rgba(0,0,0,0.03)"}}>
              {["すべて","使用中","未使用"].map(s=>(<Pill key={s} label={s} active={statF===s} onClick={()=>setStatF(s)}/>))}
            </div>
          </div>

          <div style={{fontSize:12,color:"#94A3B8",marginBottom:12,paddingLeft:2,opacity:loaded?1:0,transition:"opacity 0.5s 0.35s",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span>{filtered.length} 件表示</span>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{fetchData()}} title="データを更新"
                style={{display:"flex",alignItems:"center",gap:4,fontSize:10.5,color:"#3B82F6",background:"rgba(59,130,246,0.06)",border:"1px solid rgba(59,130,246,0.15)",borderRadius:8,padding:"4px 10px",cursor:"pointer",transition:"all 0.2s"}}
                onMouseEnter={e=>{e.currentTarget.style.background="rgba(59,130,246,0.12)"}}
                onMouseLeave={e=>{e.currentTarget.style.background="rgba(59,130,246,0.06)"}}
              ><I.Refresh s={12} c="#3B82F6" style={refreshing?{animation:"spin 0.8s linear infinite"}:{}}/>{refreshing?"更新中...":"更新"}</button>
              <button onClick={resetCardOrder}
                style={{fontSize:10.5,color:"#3B82F6",background:"rgba(59,130,246,0.06)",border:"1px solid rgba(59,130,246,0.15)",borderRadius:8,padding:"4px 12px",cursor:"pointer",transition:"all 0.2s"}}
                onMouseEnter={e=>{e.currentTarget.style.background="rgba(59,130,246,0.12)"}}
                onMouseLeave={e=>{e.currentTarget.style.background="rgba(59,130,246,0.06)"}}
              >並び順を整理</button>
            </div>
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:8,paddingBottom:60}}>
            {filtered.map((item,i)=>(
              <React.Fragment key={item.id}>
                {dragId!==null&&dragOverItem===item.id&&dragId!==item.id&&<DropLine/>}
                <Card item={item} index={i} isVisible={loaded}
                  isDragging={dragId===item.id}
                  onDragStart={e=>handleDragStart(e,item.id)}
                  onDragEnter={()=>handleDragEnter(item.id)}
                  onDragEnd={handleDragEnd}
                  onChangeUser={handleChangeUser}
                  allUsers={allUsers}
                />
              </React.Fragment>
            ))}
            {filtered.length===0&&(
              <div style={{textAlign:"center",padding:"80px 20px",color:"#CBD5E1",fontSize:14,animation:"fadeSlideUp 0.5s ease"}}>該当する備品がありません</div>
            )}
          </div>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
